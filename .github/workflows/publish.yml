on:
  workflow_dispatch:
  push:
    branches: dev

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages for doc generation
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::R6
            any::stringr
            any::glue
            any::fs
            any::readr
            any::here
            any::cli
            any::commonmark
            any::knitr
            any::rmarkdown

      - name: Build developer docs
        run: bash automate/codes/build-docs.sh

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
